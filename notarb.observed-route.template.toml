[notarb]
acknowledge_terms_of_service = true

[user]
# Use a separate funded bot wallet. Do not point this at a wallet without a backup.
keypair_path = "REPLACE_WITH_YOUR_DEDICATED_KEYPAIR_PATH"
# Keep false until a verified backup exists. true encrypts and overwrites the keypair.
protect_keypair = false

# Replace with a paid / dedicated read RPC before operating a bot.
[blockhash_updater]
rpc_url = "REPLACE_WITH_YOUR_RPC_URL"
delay_ms = 500

[price_updater]
rpc_url = "REPLACE_WITH_YOUR_RPC_URL"

[token_accounts_checker]
rpc_url = "REPLACE_WITH_YOUR_RPC_URL"
delay_seconds = 1

[market_loader]
rpc_url = "REPLACE_WITH_YOUR_RPC_URL"

[lookup_table_loader]
rpc_url = "REPLACE_WITH_YOUR_RPC_URL"

# This updater only works with durable nonce accounts whose authority is YOUR
# [user] wallet. Never copy the watched wallet's nonce accounts into this list.
[nonce_updater]
rpc_url = "REPLACE_WITH_YOUR_RPC_URL"
delay_ms = 1000

# Uncomment only after creating and funding nonce accounts owned by your wallet.
# [[nonce_pool]]
# id = "main"
# accounts = ["REPLACE_WITH_YOUR_NONCE_ACCOUNT"]

[[lookup_tables_file]]
enabled = true
path = "lookup-tables.txt"
update_seconds = 30

