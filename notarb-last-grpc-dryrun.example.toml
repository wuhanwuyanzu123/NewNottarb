# Copy to notarb-last-grpc-dryrun.toml, then set a dedicated wallet path.
# This is a no-send, LAST-targeted NotArb onchain-bot validation configuration.

[notarb]
acknowledge_terms_of_service = true

[user]
keypair_path = "REPLACE_WITH_DEDICATED_UNFUNDED_OR_TEST_KEYPAIR.json"
protect_keypair = false

# Standard Solana JSON-RPC readers.  In the current 82 setup this is a local
# SSH forward: 127.0.0.1:18899 -> 82.39.215.201:8899.
[blockhash_updater]
rpc_url = "http://127.0.0.1:18899"
delay_ms = 1000

[price_updater]
rpc_url = "http://127.0.0.1:18899"

[market_loader]
rpc_url = "http://127.0.0.1:18899"

[lookup_table_loader]
rpc_url = "http://127.0.0.1:18899"

[nonce_updater]
rpc_url = "http://127.0.0.1:18899"
delay_ms = 1000

[transaction_executor]
threads = 0

[[lookup_tables_file]]
enabled = true
path = "last-grpc-active-lookup-tables.txt"
update_seconds = 30

# Written by last-route-to-notarb.mjs from LAST gRPC evidence.
[[markets_file]]
enabled = true
path = "last-target-markets.json"
update_seconds = 15

[wsol_unwrapper]
enabled = false

# Do not enable the global module: it scans the whole Yellowstone stream.
# The target-only bridge above supplies the market group instead.
[notarb_markets]
enabled = false
dry_run = true
grpc_url = "http://127.0.0.1:18100"

# A strategy is present only for config completeness.  It is disabled, and
# there is no sender, nonce pool, or executor thread.
[[swap]]
enabled = false
mint = "SOL"

[swap.strategy_defaults]
meteora_bin_limit = 16
flash_loan = true

[[swap.strategy]]
enabled = false
cu_limit = 369000
min_priority_fee_lamports = 0
max_priority_fee_lamports = 0
cooldown_ms = 1000
senders = []
