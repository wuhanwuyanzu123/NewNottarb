# Copy to notarb-last-grpc-live.toml and set the dedicated funded bot keypair.
# This configuration is target-only: the LAST bridge supplies its exact markets
# and ALTs; the global scanner stays off. The default sender is one ordinary
# Solana JSON-RPC endpoint. Configure the reader/load RPCs below consistently
# with the deployment's LAST_READ_RPC_URL. The token-account checker is the
# exception: it uses the same indexed Helius endpoint as the ordinary sender
# so it can enumerate the bot wallet.

[notarb]
acknowledge_terms_of_service = true

[user]
keypair_path = "REPLACE_WITH_DEDICATED_FUNDED_KEYPAIR.json"
protect_keypair = false

[blockhash_updater]
rpc_url = "http://127.0.0.1:18899"
delay_ms = 250

[price_updater]
rpc_url = "http://127.0.0.1:18899"

[token_accounts_checker]
# Keep this on an indexed Helius endpoint, not the 82.39 read RPC. The 82.39
# node may exclude the bot wallet from token-account secondary indexes.
# It must exactly match the [[spam_rpc]] spam1 URL below.
rpc_url = "https://mainnet.helius-rpc.com/?api-key=REPLACE_WITH_HELIUS_API_KEY"
delay_seconds = 3

[market_loader]
rpc_url = "http://127.0.0.1:18899"

[lookup_table_loader]
rpc_url = "http://127.0.0.1:18899"

[transaction_executor]
# NotArb v1.1.2: 0 selects the dynamic cached executor thread pool; it does
# not disable the enabled sender/swap execution path.
threads = 0

[[lookup_tables_file]]
enabled = true
path = "last-target-lookup-tables.txt"
update_seconds = 5

[[markets_file]]
enabled = true
path = "last-target-markets.json"
update_seconds = 5

[wsol_unwrapper]
enabled = false

[notarb_markets]
enabled = false
dry_run = false
grpc_url = "http://127.0.0.1:18100"

[[spam_rpc]]
enabled = true
id = "spam1"
url = "https://mainnet.helius-rpc.com/?api-key=REPLACE_WITH_HELIUS_API_KEY"

[[swap]]
enabled = true
mint = "SOL"

[swap.strategy_defaults]
meteora_bin_limit = 16
max_lookup_tables = 6
flash_loan = true

[[swap.strategy]]
enabled = true
cu_limit = 369100
min_priority_fee_lamports = 1000
max_priority_fee_lamports = 25000
cooldown_ms = 1000
# NotArb maps this to the [[spam_rpc]] id above. `senders` is for [[sender]]
# profiles and leaves an ordinary spam RPC unresolved.
spam_senders = [{ rpc = "spam1", max_retries = 0, require_profit = true }]
