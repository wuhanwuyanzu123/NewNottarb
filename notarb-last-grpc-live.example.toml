# Copy to notarb-last-grpc-live.toml and set the dedicated funded bot keypair.
# This configuration is target-only: the LAST bridge supplies its exact markets
# and ALTs; the global scanner stays off. The default sender is one ordinary
# Solana JSON-RPC endpoint. Blockhash, price, market, and ALT reads use the
# recovered 82 reader directly. The token-account index and [[sender]] stay
# on the private Helius URL because 82 explicitly excludes this bot from its
# token-account secondary index.

[notarb]
acknowledge_terms_of_service = true

[user]
keypair_path = "REPLACE_WITH_DEDICATED_FUNDED_KEYPAIR.json"
protect_keypair = false

[blockhash_updater]
rpc_url = "http://82.39.215.201:8899"
delay_ms = 1000

[price_updater]
rpc_url = "http://82.39.215.201:8899"

[token_accounts_checker]
# The 82 reader answers market/ALT/blockhash queries but returns
# `excluded from account secondary indexes` for this bot's token owner query.
rpc_url = "https://mainnet.helius-rpc.com/?api-key=REPLACE_WITH_HELIUS_API_KEY"
delay_seconds = 3

[market_loader]
rpc_url = "http://82.39.215.201:8899"

[lookup_table_loader]
rpc_url = "http://82.39.215.201:8899"

[transaction_executor]
# NotArb v1.1.2: 0 selects the dynamic cached executor thread pool; it does
# not disable the enabled sender/swap execution path.
threads = 0

[[lookup_tables_file]]
enabled = true
path = "last-target-lookup-tables.txt"
update_seconds = 5

[[markets_file]]
enabled = true
path = "last-target-markets.json"
update_seconds = 5

[wsol_unwrapper]
enabled = true
# Required when enabled: read the native SOL balance from the route reader and
# submit a maintenance unwrap through the same private sender used by swaps.
reader_rpc_url = "http://82.39.215.201:8899"
sender_rpc_urls = ["https://mainnet.helius-rpc.com/?api-key=REPLACE_WITH_HELIUS_API_KEY"]

[notarb_markets]
enabled = false
dry_run = false
grpc_url = "http://127.0.0.1:18100"

[[sender]]
enabled = true
id = "spam1"
# The only Helius endpoint: ordinary transaction sending.
url = "https://mainnet.helius-rpc.com/?api-key=REPLACE_WITH_HELIUS_API_KEY"

[[swap]]
enabled = true
mint = "SOL"

[swap.strategy_defaults]
meteora_bin_limit = 16
max_lookup_tables = 6
flash_loan = true

[[swap.strategy]]
enabled = true
cu_limit = 369100
min_priority_fee_lamports = 1000
max_priority_fee_lamports = 25000
cooldown_ms = 1000
# The onchain-bot sender map resolves this [[sender]] id. Leave
# require_profit out: it is optional and the strategy's regular evaluator
# still decides whether an opportunity reaches the sender.
senders = [{ id = "spam1", max_retries = 0 }]
